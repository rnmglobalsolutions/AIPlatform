name: AIMAP Infra Dev

on:
  push:
    branches:
      - main
    paths:
      - 'nextgen/AIMultiAgentPlatform/infra/**'
      - '.github/workflows/aimap-infra-dev.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aimap-infra-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: What-If Dev Infrastructure
        run: |
          az deployment sub what-if \
            --name aimap-dev-infra \
            --location eastus \
            --template-file nextgen/AIMultiAgentPlatform/infra/main.subscription.bicep \
            --parameters nextgen/AIMultiAgentPlatform/infra/main.subscription.dev.bicepparam

      - name: Deploy Dev Infrastructure
        run: |
          az deployment sub create \
            --name aimap-dev-infra \
            --location eastus \
            --template-file nextgen/AIMultiAgentPlatform/infra/main.subscription.bicep \
            --parameters nextgen/AIMultiAgentPlatform/infra/main.subscription.dev.bicepparam

      - name: Show Subscription Deployment Operations
        if: failure()
        continue-on-error: true
        run: |
          az deployment operation sub list \
            --name aimap-dev-infra \
            --output table

      - name: Show Environment Deployment Operations
        if: failure()
        continue-on-error: true
        run: |
          az deployment operation group list \
            --resource-group rg-aimap-dev \
            --name environment-aimap-dev \
            --output table

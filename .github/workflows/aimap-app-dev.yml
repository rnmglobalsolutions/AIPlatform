name: AIMAP App Dev

on:
  push:
    branches:
      - main
    paths:
      - 'global.json'
      - 'nextgen/AIMultiAgentPlatform/src/**'
      - 'nextgen/AIMultiAgentPlatform/tests/**'
      - 'nextgen/AIMultiAgentPlatform/AIMultiAgentPlatform.slnx'
      - 'nextgen/AIMultiAgentPlatform/Directory.Packages.props'
      - '.github/workflows/aimap-app-dev.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aimap-app-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Build Test and Deploy Dev App
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Dev App Names
        id: app-names
        shell: bash
        run: |
          API_APP_NAME="$(az deployment sub show --name aimap-dev-infra --query "properties.outputs.apiAppName.value" -o tsv)"
          WORKER_APP_NAME="$(az deployment sub show --name aimap-dev-infra --query "properties.outputs.workerFunctionAppName.value" -o tsv)"

          if [[ -z "$API_APP_NAME" || -z "$WORKER_APP_NAME" ]]; then
            echo "Missing infrastructure outputs. Deploy dev infrastructure first."
            exit 1
          fi

          echo "api_app_name=$API_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "worker_app_name=$WORKER_APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore nextgen/AIMultiAgentPlatform/AIMultiAgentPlatform.slnx

      - name: Build
        run: dotnet build nextgen/AIMultiAgentPlatform/AIMultiAgentPlatform.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test nextgen/AIMultiAgentPlatform/AIMultiAgentPlatform.slnx --configuration Release --no-build

      - name: Publish API
        run: dotnet publish nextgen/AIMultiAgentPlatform/src/AIMultiAgentPlatform.Api/AIMultiAgentPlatform.Api.csproj --configuration Release --no-build --output artifacts/api

      - name: Publish Workers
        run: dotnet publish nextgen/AIMultiAgentPlatform/src/AIMultiAgentPlatform.Workers/AIMultiAgentPlatform.Workers.csproj --configuration Release --no-build --output artifacts/workers

      - name: Deploy API Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.app-names.outputs.api_app_name }}
          package: artifacts/api

      - name: Deploy Worker Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.app-names.outputs.worker_app_name }}
          package: artifacts/workers
